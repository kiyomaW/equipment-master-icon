<html>
<head>
  <link rel="apple-touch-icon" href="https://kiyomaw.github.io/equipment-master-icon/icon.png.png">
  <meta name="apple-mobile-web-app-title" content="Equipment Master">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Equipment Master</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #ffffff;
    }

    .page {
      max-width: 420px;
      margin: 0 auto;
      padding-top: 35px;
    }

    h1 {
      font-size: 34px;
      margin-bottom: 28px;
    }

    h2 {
      font-size: 20px;
      margin-top: 28px;
      margin-bottom: 12px;
    }

    label {
      font-size: 15px;
      font-weight: bold;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 16px;
      font-size: 18px;
      margin-top: 8px;
      margin-bottom: 12px;
      border: 1px solid #bbb;
      border-radius: 8px;
    }

    button, .btn {
      width: 100%;
      box-sizing: border-box;
      display: block;
      padding: 18px;
      font-size: 18px;
      text-align: center;
      text-decoration: none;
      border: 0;
      border-radius: 10px;
      margin-top: 12px;
    }

    .primary {
      background: #673ab7;
      color: white;
    }

    .dark {
      background: #444;
      color: white;
    }

    .light {
      background: #eeeeee;
      color: #111;
    }

    .note {
      margin-top: 20px;
      color: #666;
      font-size: 14px;
      line-height: 1.5;
    }

    .section {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #ddd;
    }
  </style>
</head>

<body>
  <div class="page">
    <h1>Equipment Master</h1>

    <a class="btn primary" href="new.html">
      + New Equipment
    </a>

    <div class="section">
      <h2>Search Equipment</h2>

<label>Equipment ID or Name</label>
<input id="equipmentSearch" placeholder="Example: BP71, 1100, EQ0019" oninput="filterEquipment()">

<div id="searchResults"></div>
    </div>

    <div class="section">
      <a class="btn dark"
         href="https://script.google.com/macros/s/AKfycbw_bwxxQVqE4jAvmL-MNtBDtl36pX_bp1jUHCcKL9vWP1YMrAZAllirqi9kUuw8_tXP/exec?id=print">
        Print QR Labels
      </a>
    </div>
<div class="section">
  <h2>Recent Equipment</h2>
  <div id="equipmentList">Loading...</div>
</div>
    <div class="note">
      Use this page to register equipment, open maintenance history, and print QR labels.
    </div>
  </div>

  <script>
   let allEquipment = [];

  function loadEquipmentList(items) {
    allEquipment = items;

    renderRecentEquipment(items.slice(0, 10));
  }

  function renderRecentEquipment(items) {
    const list = document.getElementById("equipmentList");

    list.innerHTML = items.map(item => equipmentCard(item)).join("");
  }

  function filterEquipment() {
    const keyword = document.getElementById("equipmentSearch").value.trim().toLowerCase();
    const results = document.getElementById("searchResults");

    if (!keyword) {
      results.innerHTML = "";
      return;
    }

    const filtered = allEquipment.filter(item =>
      item.id.toLowerCase().includes(keyword) ||
      String(item.name).toLowerCase().includes(keyword)
    ).slice(0, 10);

    results.innerHTML = filtered.length
      ? filtered.map(item => equipmentCard(item)).join("")
      : "<p style='color:#666;'>No equipment found.</p>";
  }

  function equipmentCard(item) {
    return `
      <a href="${item.url}" style="
        display:block;
        padding:14px;
        margin:8px 0;
        border:1px solid #ddd;
        border-radius:10px;
        text-decoration:none;
        color:#111;
        font-size:16px;
      ">
        <b>${item.id}</b><br>
        ${item.name}
      </a>
    `;
  }
</script>

<script src="https://script.google.com/macros/s/AKfycbw_bwxxQVqE4jAvmL-MNtBDtl36pX_bp1jUHCcKL9vWP1YMrAZAllirqi9kUuw8_tXP/exec?id=list"></script>
  <script>
  function loadEquipmentList(items) {
    const list = document.getElementById("equipmentList");

    list.innerHTML = items.slice(0, 10).map(item => `
      <a href="${item.url}" style="
        display:block;
        padding:14px;
        margin:8px 0;
        border:1px solid #ddd;
        border-radius:10px;
        text-decoration:none;
        color:#111;
        font-size:16px;
      ">
        <b>${item.id}</b><br>
        ${item.name}
      </a>
    `).join("");
  }
</script>

<script src="https://script.google.com/macros/s/AKfycbw_bwxxQVqE4jAvmL-MNtBDtl36pX_bp1jUHCcKL9vWP1YMrAZAllirqi9kUuw8_tXP/exec?id=list"></script>
</body>
</html>
